apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  labels:
    app: my-app
spec:
  replicas: 2 # Количество запущенных копий приложения
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: jenkins
        image: dhi.io/jenkins:2.562
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  selector:
    app: my-app
  ports:
    - protocol: TCP
      port: 80      # Порт сервиса
      targetPort: 80 # Порт внутри контейнера
  type: ClusterIP # Тип доступа (внутренний IP кластера)
